name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/setup@v1
        with:
          runtime: node@24
          cache: true

      - name: Lint workspace
        run: pnpm lint

      - name: Build lint plugins
        run: pnpm --filter '@nustackjs/lint-plugin-*' build

      - name: Lint @nustackjs/lint
        run: pnpm --filter @nustackjs/lint lint

  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/setup@v1
        with:
          runtime: node@24
          cache: true

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck
