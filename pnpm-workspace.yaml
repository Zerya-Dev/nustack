packages:
  - 'packages/*'
  - 'modules/*'
  - 'modules/*/playground'
catalogs:
  build:
    '@nuxt/module-builder': ^1.0.2
    tsdown: latest
    unbuild: ^3.6.1
  eslint:
    '@antfu/eslint-config': ^9.0.0
    '@eslint/config-inspector': ^1.5.0
    '@nuxt/eslint': ^1.15.2
    '@nuxt/eslint-config': ^1.15.2
    '@oxlint/plugins': ^1.70.0
    '@typescript-eslint/parser': ^8.60.1
    '@typescript-eslint/rule-tester': ^8.60.1
    '@typescript-eslint/utils': ^8.60.1
    eslint: ^10.4.1
    eslint-flat-config-utils: ^3.2.0
    eslint-plugin-better-tailwindcss: ^3.7.10
    eslint-plugin-vue: ^10.5.0
    mdclint: ^0.1.2
    vue-eslint-parser: ^10.4.1
  nuxt:
    '@nuxt/content': ^3.0.0
    '@nuxt/devtools': ^3.2.4
    '@nuxt/kit': ^4.4.7
    '@nuxt/schema': ^4.4.7
    '@nuxt/test-utils': ^4.0.3
    '@nuxt/ui': ^4.6.1
    defu: ^6.1.7
    nuxt: ^4.4.7
    unimport: ^6.3.0
  release:
    changelogen: ^0.6.2
  test:
    vitest: ^4.1.8
  typescript:
    '@types/node': latest
    typescript: ~6.0.3
    vue-tsc: ^3.3.3
  vue:
    '@vueuse/core': ^14.2.1
    tailwindcss: ^4.0.0
allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  unrs-resolver: true
  vue-demi: true
